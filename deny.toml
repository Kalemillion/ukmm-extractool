[graph]
targets = ["x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

[advisories]
unmaintained = "workspace"
unsound = "workspace"
yanked = "deny"
ignore = [
  # Advisory IDs here must match actual advisories in the database.
  # If an advisory is not encountered, cargo deny warns — remove it.
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BlueOak-1.0.0",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "GPL-3.0-or-later",
]
exceptions = []

[bans]
wildcards = "warn"

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "https://github.com/NiceneNerd/msyt",
  "https://github.com/NiceneNerd/msbt-rs",
]